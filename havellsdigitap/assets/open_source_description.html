        }

            width: 50%;

            font-size: 40px;

            float: left;

        .header-item {
            width: 50%;
            text-align: center;

            padding: 0 10px;
            float: left;

        .item-single {
            background: #fff;
            padding: 10px 0;

        }

            width: 20%;

            text-align: center;

        }

        .txt {
            float: left;
            padding: 0 10px;
            width: 20%;

            text-align: center;
            word-wrap: break-word;

                    + '<a href="'+data[i][6]+'" class="link1">'+data[i][4]+'</a>'

            } else {

                    + '<a href="'+data[i][6]+'" class="link1">'+data[i][4]+'</a>'

            }
        }
